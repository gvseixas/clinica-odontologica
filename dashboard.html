<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Agendamento | JG Odontologia</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">JG ODONTOLOGIA</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" onclick="logout(); return false;">Sair</a></li>
            </ul>
        </nav>
    </header>

    <div class="dashboard-header">
        <h1>Área do Paciente</h1>
        <div class="user-info">
            <span id="user-info">Carregando...</span>
            <button class="logout-btn" onclick="logout()">Sair</button>
        </div>
    </div>

    <main class="section">
        <div class="appointment-container">
            <h2>Agende sua Consulta</h2>
            <p style="text-align: center; max-width: 600px; margin: 0 auto 3rem; color: #6c757d; font-size: 1.1rem;">Preencha o formulário abaixo de forma simples e prática.</p>
            
            <div class="appointment-card">
                <form class="appointment-form" id="appointment-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="patient-name">Nome Completo *</label>
                            <input type="text" id="patient-name" required>
                        </div>
                        <div class="form-group">
                            <label for="patient-phone">Telefone/WhatsApp *</label>
                            <input type="tel" id="patient-phone" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="patient-email">Email *</label>
                            <input type="email" id="patient-email" required>
                        </div>
                        <div class="form-group">
                            <label for="service-type">Tipo de Serviço *</label>
                            <select id="service-type" required>
                                <option value="">Selecione...</option>
                                <option value="clareamento">Clareamento Dental</option>
                                <option value="implantes">Implantes</option>
                                <option value="limpeza">Limpeza Profissional</option>
                                <option value="ortodontia">Ortodontia</option>
                                <option value="consulta">Consulta Geral</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="appointment-date">Data Preferencial *</label>
                            <input type="date" id="appointment-date" required>
                        </div>
                        <div class="form-group">
                            <label for="appointment-time">Horário Preferencial *</label>
                            <input type="time" id="appointment-time" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="notes">Observações (opcional)</label>
                        <textarea id="notes" rows="3" placeholder="Alguma preferência especial? Sintomas? ..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Confirmar Agendamento</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-links">
            <a href="#"><i style="font-size: 1.5rem;">📘</i></a>
            <a href="#"><i style="font-size: 1.5rem;">📷</i></a>
            <a href="#"><i style="font-size: 1.5rem;">🐦</i></a>
        </div>
        <p>&copy; 2024 JG Odontologia. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
