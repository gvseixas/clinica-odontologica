<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - JG Odontologia</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">JG ODONTOLOGIA</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="section">
        <div class="form-container">
            <div class="auth-form">
                <h2>Crie sua Conta</h2>
                <p style="text-align: center; color: #6c757d; margin-bottom: 2rem;">Cadastre-se para agendar consultas</p>
                
                <form id="register-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="register-name">Nome Completo</label>
                            <input type="text" id="register-name" required placeholder="Seu nome">
                        </div>
                        <div class="form-group">
                            <label for="register-phone">Telefone</label>
                            <input type="tel" id="register-phone" required placeholder="(47) 99999-9999">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input type="email" id="register-email" required placeholder="seu@email.com">
                    </div>
                    <button type="submit" class="submit-btn">Cadastrar</button>
                </form>

                <p style="text-align: center; margin-top: 1.5rem; color: #6c757d;">
                    Já tem conta? <a href="login.html" style="color: #17a2b8; text-decoration: none; font-weight: 500;">Faça login</a>
                </p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
